        </p>
        <hr>
    </div>
    <div class="post-content">
        <p>装箱： 基本类型-&gt;包装类型。拆箱相反。jdk5及以后自动拆装箱。</p>
<p>手动装箱需要用到<code>new Integer(n)</code>或者<code>Integer.valueOf(n)</code>，手动拆箱需要<code>integer.intValue()</code>。自动拆装箱可以无视数据类型直接赋值，但底层实际上还是一样的。</p>
<p>Integer使用自动装箱（或手动装箱的valueOf方法）创建对象时，如果范围在-128-127范围内，返回的对象是同一个，不在范围内时底层new对象。</p>
